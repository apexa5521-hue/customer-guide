<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DailyMetrics</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; background: #f6f7fb; color: #111; }
    .wrap { max-width: 900px; margin: 24px auto; padding: 16px; }
    .card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 8px 22px rgba(0,0,0,.06); }
    h1 { margin: 0 0 14px; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 12px; color: #444; display: block; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      border: 1px solid #d9dce3; border-radius: 10px; outline: none;
      background: #fff; font-size: 14px;
    }
    textarea { min-height: 90px; resize: vertical; }
    .row { margin-top: 12px; }
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
    button {
      padding: 10px 14px; border: 0; border-radius: 10px; cursor: pointer;
      background: #111827; color: #fff; font-weight: 600;
    }
    button[disabled] { opacity: .6; cursor: not-allowed; }
    .loading::after { content: " ..."; }

    /* Radio toggles */
    .radioBox { display: flex; gap: 12px; padding: 10px 12px; border: 1px solid #d9dce3; border-radius: 10px; }
    .radioBox label { margin: 0; font-size: 14px; color: #111; display: flex; gap: 6px; align-items: center; }

    /* Toast */
    .toast { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); padding: 10px 14px;
      border-radius: 10px; box-shadow: 0 10px 24px rgba(0,0,0,.12); display: none; z-index: 9999;
      background: #111827; color: #fff; font-weight: 600;
    }
    .toast.ok { background: #065f46; }
    .toast.err { background: #991b1b; }

    /* KPI strip */
    #kpiStrip { display: none; margin-top: 14px; }
    #kpiRow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .kpi { border-radius: 12px; padding: 10px; background: #f3f4f6; }
    .kpi .kpi-lbl { font-size: 12px; color: #444; }
    .kpi .kpi-val { font-size: 18px; font-weight: 800; margin-top: 6px; }
    .kpi.ok { background: #dcfce7; }
    .kpi.warn { background: #fef9c3; }
    .kpi.bad { background: #fee2e2; }
    .kpi.info { background: #e0f2fe; }

    #alertsArea { margin-top: 10px; display: grid; gap: 8px; }
    .alert { padding: 10px 12px; border-radius: 12px; font-weight: 600; }
    .alert.ok { background: #dcfce7; }
    .alert.warn { background: #fef9c3; }
    .alert.bad { background: #fee2e2; }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      #kpiRow { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>

  <div class="wrap">
    <div class="card">
      <h1>تقرير Daily Metrics</h1>

      <form id="reportForm" autocomplete="off">
        <div class="grid">
          <div>
            <label for="f-date">التاريخ *</label>
            <input id="f-date" type="date" required />
          </div>

          <div>
            <label for="f-branch">الفرع *</label>
            <input id="f-branch" type="text" placeholder="مثال: الرياض" required />
          </div>

          <div>
            <label for="f-agent">اسم الموظف *</label>
            <input id="f-agent" type="text" placeholder="الاسم" required />
          </div>

          <div>
            <label for="f-total">إجمالي المكالمات</label>
            <input id="f-total" type="number" min="0" value="0" />
          </div>

          <div>
            <label for="f-answered">المكالمات المُجابة</label>
            <input id="f-answered" type="number" min="0" value="0" />
          </div>

          <div>
            <label for="f-unanswered">غير مُجاب (نهاية اليوم)</label>
            <input id="f-unanswered" type="number" min="0" value="0" />
          </div>

          <div>
            <label for="f-cbc">Callbacks Completed</label>
            <input id="f-cbc" type="number" min="0" value="0" />
          </div>

          <div>
            <label for="f-cbm">Callback Time (minutes)</label>
            <input id="f-cbm" type="number" min="0" value="0" />
          </div>
        </div>

        <div class="grid row">
          <div>
            <label>هل توجد مشكلة اتصالات؟</label>
            <div class="radioBox">
              <label><input type="radio" name="callIssues" value="no" checked> لا</label>
              <label><input type="radio" name="callIssues" value="yes"> نعم</label>
            </div>
          </div>

          <div>
            <label>هل توجد مشكلة الرقم الموحد؟</label>
            <div class="radioBox">
              <label><input type="radio" name="uniIssues" value="no" checked> لا</label>
              <label><input type="radio" name="uniIssues" value="yes"> نعم</label>
            </div>
          </div>
        </div>

        <div class="row">
          <label for="f-notes">ملاحظات</label>
          <textarea id="f-notes" placeholder="اكتب ملاحظاتك هنا..."></textarea>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">إرسال</button>
          <span id="hint" style="font-size:12px;color:#555;"></span>
        </div>
      </form>

      <!-- KPI preview -->
      <div id="kpiStrip">
        <div id="kpiRow"></div>
        <div id="alertsArea"></div>
      </div>

    </div>
  </div>

<script>
  // ─────────────────────────────────────────────────────────────
  // Helpers: Toast / Validation / Reset
  // ─────────────────────────────────────────────────────────────
  function showToast(msg, type) {
    var t = document.getElementById("toast");
    t.className = "toast " + (type || "");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(function(){ t.style.display = "none"; }, 3200);
  }

  function validate() {
    var date = document.getElementById("f-date").value;
    var branch = document.getElementById("f-branch").value.trim();
    var agent = document.getElementById("f-agent").value.trim();

    if (!date) { showToast("❌ الرجاء اختيار التاريخ", "err"); return false; }
    if (!branch) { showToast("❌ الرجاء إدخال الفرع", "err"); return false; }
    if (!agent) { showToast("❌ الرجاء إدخال اسم الموظف", "err"); return false; }
    return true;
  }

  function resetForm() {
    document.getElementById("reportForm").reset();
    document.getElementById("kpiStrip").style.display = "none";
    document.getElementById("hint").textContent = "";
  }

  // ─────────────────────────────────────────────────────────────
  // KPI PREVIEW (نفس منطقك تقريبًا)
  // ─────────────────────────────────────────────────────────────
  function showKPIs(d) {
    var total    = parseInt(d.TotalCalls, 10)         || 0;
    var ans      = parseInt(d.AnsweredCalls, 10)      || 0;
    var unans    = parseInt(d.UnansweredEOD, 10)      || 0;
    var cbc      = parseInt(d.CallbacksCompleted, 10) || 0;

    var rate     = total > 0 ? (ans / total * 100) : 0;
    var unansPct = total > 0 ? (unans / total * 100) : 0;

    var rC = rate     >= 90 ? "ok" : rate     >= 85 ? "warn" : "bad";
    var uC = unansPct <= 5  ? "ok" : unansPct <= 15 ? "warn" : "bad";

    document.getElementById("kpiRow").innerHTML =
      '<div class="kpi info"><div class="kpi-lbl">إجمالي</div><div class="kpi-val">' + total + '</div></div>' +
      '<div class="kpi info"><div class="kpi-lbl">مُجاب</div><div class="kpi-val">' + ans + '</div></div>' +
      '<div class="kpi ' + rC + '"><div class="kpi-lbl">معدل الرد</div><div class="kpi-val">' + rate.toFixed(1) + '%</div></div>' +
      '<div class="kpi ' + uC + '"><div class="kpi-lbl">غير مُجاب</div><div class="kpi-val">' + unans + '</div></div>' +
      '<div class="kpi info"><div class="kpi-lbl">إعادة تواصل</div><div class="kpi-val">' + cbc + '</div></div>';

    var alerts = [];
    if (rate < 85)
      alerts.push({ t:"bad",  m:"⚠️ معدل الرد " + rate.toFixed(1) + "% – أقل من الحد الأدنى 85%" });
    else if (rate < 90)
      alerts.push({ t:"warn", m:"💛 معدل الرد " + rate.toFixed(1) + "% – قريب من الحد الأدنى" });
    else
      alerts.push({ t:"ok",   m:"✅ معدل الرد ممتاز: " + rate.toFixed(1) + "%" });

    if (unansPct > 5)
      alerts.push({ t:"warn", m:"📵 نسبة غير المُجاب " + unansPct.toFixed(1) + "% – تجاوز 5%" });
    if (d.CallIssues === "Yes")
      alerts.push({ t:"bad",  m:"🔴 مشكلة مُسجَّلة في الاتصالات" });
    if (d.UnifiedNumberIssues === "Yes")
      alerts.push({ t:"bad",  m:"📞 مشكلة مُسجَّلة في الرقم الموحد" });

    document.getElementById("alertsArea").innerHTML = alerts.map(function(a) {
      return '<div class="alert ' + a.t + '">' + a.m + '</div>';
    }).join("");

    document.getElementById("kpiStrip").style.display = "block";
    document.getElementById("kpiStrip").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ─────────────────────────────────────────────────────────────
  // FORM SUBMISSION (الحل الجذري)
  // - بدون fetch
  // - بدون no-cors
  // - تأكيد نجاح/فشل حقيقي من Apps Script
  // ─────────────────────────────────────────────────────────────
  document.getElementById("reportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    if (!validate()) return;

    var btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.classList.add("loading");
    document.getElementById("hint").textContent = "جاري الحفظ في الشيت...";

    var callIssues = document.querySelector('input[name=callIssues]:checked').value === "yes" ? "Yes" : "No";
    var uniIssues  = document.querySelector('input[name=uniIssues]:checked').value  === "yes" ? "Yes" : "No";

    var payload = {
      Date:                document.getElementById("f-date").value,
      Branch:              document.getElementById("f-branch").value.trim(),
      AgentName:           document.getElementById("f-agent").value.trim(),
      TotalCalls:          document.getElementById("f-total").value,
      AnsweredCalls:       document.getElementById("f-answered").value,
      CallbacksCompleted:  document.getElementById("f-cbc").value,
      CallbackTimeMinutes: document.getElementById("f-cbm").value,
      UnansweredEOD:       document.getElementById("f-unanswered").value,
      CallIssues:          callIssues,
      UnifiedNumberIssues: uniIssues,
      Notes:               (document.getElementById("f-notes").value || "").trim()
    };

    // submitMetrics لازم تكون موجودة في Code.gs
    // وتعمل appendRow ثم ترجع {ok:true} أو {ok:false,error:"..."}
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.classList.remove("loading");
        document.getElementById("hint").textContent = "";

        if (res && res.ok) {
          showToast("✅ تم الإرسال بنجاح", "ok");
          showKPIs(payload);
          resetForm();
        } else {
          showToast("❌ فشل الإرسال: " + ((res && res.error) ? res.error : "Unknown"), "err");
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.classList.remove("loading");
        document.getElementById("hint").textContent = "";
        showToast("❌ خطأ: " + err.message, "err");
      })
      .submitMetrics(payload);
  });
</script>

</body>
</html>
